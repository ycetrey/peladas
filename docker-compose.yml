services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: peladas
      POSTGRES_PASSWORD: peladas
      POSTGRES_DB: peladas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peladas -d peladas"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - peladas-internal

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    working_dir: /repo/apps/api
    environment:
      DATABASE_URL: postgresql://peladas:peladas@db:5432/peladas?schema=public
      PORT: "3001"
      NODE_ENV: development
      # Docker Desktop (Windows/macOS): ficheiros montados nem sempre disparam inotify; polling garante reload.
      CHOKIDAR_USEPOLLING: "true"
      JWT_SECRET: "${JWT_SECRET:-dev-jwt-secret-change-in-production}"
      WEB_JOGADOR_ORIGIN: "${WEB_JOGADOR_ORIGIN:-http://localhost:3002}"
      WEB_ADMIN_ORIGIN: "${WEB_ADMIN_ORIGIN:-http://localhost:3003}"
    volumes:
      # Monorepo + node_modules em volumes anónimos (evita misturar com instalação do host sem JWT, etc.)
      - .:/repo
      - /repo/node_modules
      - /repo/apps/api/node_modules
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - peladas-internal

  web-jogador:
    build:
      context: .
      dockerfile: apps/web-jogador/Dockerfile
    working_dir: /repo/apps/web-jogador
    environment:
      NODE_ENV: development
      DOCKER: "1"
      JWT_SECRET: "${JWT_SECRET:-dev-jwt-secret-change-in-production}"
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}"
      API_INTERNAL_BASE_URL: "http://api:3001"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXT_WEBPACK_USE_POLLING: "1"
    volumes:
      - .:/repo
      - /repo/node_modules
      - /repo/apps/web-jogador/node_modules
      # Evita misturar .next do host com Linux e reduz falhas de HMR em bind mounts.
      - /repo/apps/web-jogador/.next
    ports:
      - "${WEB_JOGADOR_PORT:-3002}:3000"
    depends_on:
      - api
    networks:
      - peladas-internal

  web-admin:
    build:
      context: .
      dockerfile: apps/web-admin/Dockerfile
    working_dir: /repo/apps/web-admin
    environment:
      NODE_ENV: development
      DOCKER: "1"
      JWT_SECRET: "${JWT_SECRET:-dev-jwt-secret-change-in-production}"
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}"
      API_INTERNAL_BASE_URL: "http://api:3001"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXT_WEBPACK_USE_POLLING: "1"
    volumes:
      - .:/repo
      - /repo/node_modules
      - /repo/apps/web-admin/node_modules
      - /repo/apps/web-admin/.next
    ports:
      - "${WEB_ADMIN_PORT:-3003}:3000"
    depends_on:
      - api
    networks:
      - peladas-internal

volumes:
  postgres_data:

networks:
  peladas-internal:
    driver: bridge
